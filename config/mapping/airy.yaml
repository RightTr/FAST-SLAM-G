common:
    lid_topic:  "/rslidar_points"
    imu_topic:  "/rslidar_imu_data"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible
    time_offset_lidar_to_imu: 0.0 # Time offset between lidar and IMU calibrated by other algorithms, e.g. LI-Init (can be found in README).
                                # This param will take effect no matter what time_sync_en is. So if the time offset is not known exactly, please set as 0.0
    imu_flip: true              # If IMU axes are opposite to the expected convention, set true.

preprocess:
    lidar_type: 4                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 for RoboSense LiDAR
    scan_line: 96
    timestamp_unit: 0                 # 0-second, 1-milisecond, 2-microsecond, 3-nanosecond.
    blind: 0.5

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    360.0
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic
    lidar_to_imu_T: [ 0.00418, 0.00425, -0.00446 ] # LiDAR position in the IMU coordinate frame
    lidar_to_imu_R: [ 0.000076, -0.999999,  0.001261, # LiDAR rotation in the IMU coordinate frame
                -0.999999, -0.000076,  0.001208,
                -0.001208, -0.001261, -0.999999 ]

# === DIFOP PACKET DECODE ===
# Header frame: LiDAR
# Child frame: IMU
# Quaternion: qx=0.710241, qy=-0.703957, qz=-0.001208, qw=-0.000053
# Position XYZ: x=0.004250, y=0.004180, z=-0.004460
# ==========================

publish:
    path_en:  true
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

res_save:
    res_save_en: false
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
    frame_save_en: true    # save each undistorted scan (LiDAR body frame) as PCD + pose to ROOT_DIR/SCAN_FRAMES/

zupt:
    use_zupt: true              # enable zero velocity update
    zupt_acc_var_threshold: 0.0001   # (m/s²)² acceleration variance threshold for ZUPT
    zupt_gyro_var_threshold: 0.00001 # (rad/s)² gyroscope variance threshold for ZUPT
